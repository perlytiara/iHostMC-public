<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <title>iHostMC - Minecraft Server Manager</title>
    <script>
      (function () {
        var theme = "dark";
        var style = "simple";
        var palette = "monochrome";
        try {
          var t = localStorage.getItem("ihostmc-theme");
          if (t) theme = t;
          var s = localStorage.getItem("ihostmc-design-style");
          if (s === "standard") style = s;
          var p = localStorage.getItem("ihostmc-design-palette");
          if (p === "colorful") palette = p;
        } catch (e) {}
        var darkThemes = { dark: 1, midnight: 1, neon: 1 };
        var root = document.documentElement;
        root.setAttribute("data-theme", theme);
        root.setAttribute("data-design-style", style);
        root.setAttribute("data-design-palette", palette);
        if (darkThemes[theme]) root.classList.add("dark");
        else root.classList.remove("dark");
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: hsl(0 0% 98%);
      }
      .dark html, .dark body {
        background: hsl(240 10% 3.9%);
      }
      [data-theme="ocean"] html, [data-theme="ocean"] body { background: hsl(210 40% 98%); }
      [data-theme="forest"] html, [data-theme="forest"] body { background: hsl(140 20% 97%); }
      [data-theme="sunset"] html, [data-theme="sunset"] body { background: hsl(30 30% 97%); }
      [data-theme="midnight"] html, [data-theme="midnight"] body { background: hsl(260 30% 6%); }
      [data-theme="neon"] html, [data-theme="neon"] body { background: hsl(220 20% 5%); }
      #root {
        margin: 0;
        padding: 0;
        position: relative;
        min-width: 100%;
        min-height: 100vh;
        width: 100%;
        height: 100%;
        background: hsl(0 0% 98%);
        color: hsl(240 10% 4%);
        box-sizing: border-box;
      }
      .dark #root {
        background: hsl(240 10% 3.9%);
        color: hsl(0 0% 98%);
      }
      [data-theme="ocean"] #root { background: hsl(210 40% 98%); color: hsl(210 40% 6%); }
      [data-theme="forest"] #root { background: hsl(140 20% 97%); color: hsl(140 20% 8%); }
      [data-theme="sunset"] #root { background: hsl(30 30% 97%); color: hsl(20 30% 8%); }
      [data-theme="midnight"] #root { background: hsl(260 30% 6%); color: hsl(260 10% 95%); }
      [data-theme="neon"] #root { background: hsl(220 20% 5%); color: hsl(0 0% 95%); }
      /* Full-bleed wrapper keeps loading centered even after app CSS loads */
      #root-loading-wrap {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 100%;
        min-height: 100%;
      }
      #root-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        width: 100%;
        max-width: 28rem;
        padding: 3rem;
      }
      #root-loading-logo {
        width: 5rem;
        height: 5rem;
        opacity: 0.95;
      }
      /* Progress bar: discreet gray. Light themes = light track, darker gray fill */
      #root-loading-bar-wrap {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: hsl(240 5% 92%);
        overflow: hidden;
      }
      #root-loading-bar {
        height: 100%;
        width: 30%;
        border-radius: 999px;
        background: hsl(240 5% 55%);
        animation: ihostmc-load-ease 1.8s ease-in-out infinite;
      }
      /* Dark themes: darker track, muted gray fill */
      .dark #root-loading-bar-wrap,
      [data-theme="midnight"] #root-loading-bar-wrap,
      [data-theme="neon"] #root-loading-bar-wrap {
        background: hsl(240 4% 14%);
      }
      .dark #root-loading-bar,
      [data-theme="midnight"] #root-loading-bar,
      [data-theme="neon"] #root-loading-bar {
        background: hsl(240 5% 42%);
      }
      @keyframes ihostmc-load-ease {
        0% { transform: translateX(-100%); }
        60% { transform: translateX(220%); }
        100% { transform: translateX(-100%); }
      }
      #root-loading-text {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: hsl(240 4% 46%);
      }
      .dark #root-loading-text,
      [data-theme="midnight"] #root-loading-text,
      [data-theme="neon"] #root-loading-text {
        color: hsl(240 5% 65%);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loading-wrap">
        <div id="root-loading" aria-live="polite" aria-busy="true">
        <svg id="root-loading-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="hsl(250 100% 70%)" />
              <stop offset="100%" stop-color="hsl(252 72% 55%)" />
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="6" fill="url(#logo-bg)" />
          <circle cx="11" cy="10" r="2" fill="white" />
          <path d="M11 14v8 M14 14v5 M14 17h4 M18 14v8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        </svg>
        <div id="root-loading-bar-wrap">
          <div id="root-loading-bar"></div>
        </div>
        <p id="root-loading-text">Loading…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
