# frp server config for iHostMC public relay (play.ihost.one)
# Token must match server/relay-public-token.txt (one token for all iHostMC users)
# Run from iHostMC/server: ./run.sh or frps -c frps/frps.toml

bindPort = 7000
auth.method = "token"
auth.token = "5b77e0ba00c5eed243694f45d189b2673ffba2ae33a9a78d"

# Ports clients can use for proxy (Minecraft traffic). Must match firewall (ufw allow 20000:60000).
allowPorts = [
  { start = 20000, end = 60000 }
]

# Limit ports per client to reduce abuse
maxPortsPerClient = 5

# Give clients more time to reconnect after brief outages (default 90s)
transport.heartbeatTimeout = 120
