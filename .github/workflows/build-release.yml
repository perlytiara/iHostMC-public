name: "Build & Release"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npm run build:public
        env:
          VITE_API_BASE_URL: https://api.ihost.one
          VITE_WEBSITE_URL: https://ihost.one
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: "iHostMC ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}"
          body: |
            ## iHostMC ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}

            ### Installation
            | File | Description |
            |------|-------------|
            | `iHostMC_*_x64-setup.exe` | **Recommended** — Windows installer (NSIS) |
            | `iHostMC_*_x64_en-US.msi` | Windows installer (MSI) |

            ### Features
            - Create and manage Minecraft servers (Vanilla, Paper, Purpur, Fabric, Forge, NeoForge, Quilt, Spigot, Bukkit)
            - Browse and install mods & plugins from Modrinth, CurseForge, and Spiget
            - Built-in server terminal with start/stop controls
            - Share your server with friends via relay tunnels
            - In-app auto-updates — you will be notified when a new version is available
            - AI advisor for server management help

            ### Auto-Updates
            Existing installations will automatically detect this release and prompt to update.

            ---
            *Built with [Tauri](https://tauri.app) + React*
          draft: false
          make_release_latest: true
          replace_assets: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
