name: Build release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Ensure env
        run: npm run ensure-env

      - name: Verify signing key (fail fast before long build)
        run: |
          node -e "require('fs').writeFileSync('verify.bin','x')"
          npx tauri signer sign verify.bin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sync version and run tests
        run: npm run sync-version && npm run test:run

      - name: Build Tauri (Windows)
        run: npm run build:public
        env:
          VITE_API_BASE_URL: https://api.ihost.one
          VITE_WEBSITE_URL: https://ihost.one
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate latest.json for updater
        run: node scripts/gen-latest-json.cjs

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: iHostMC ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          body: |
            ## v0.5.3
            - **Tutorial first:** Update popup only shows after onboarding is complete (no more invisible overlay blocking tutorial).
            - **Developer settings:** Tab always visible; toggle "Show Developer menu" to enable the debug menu (☰ → Developer, Ctrl+Shift+D). Stripe/tier overrides still require backend override.
            - **Root repo:** App is built only from iHostMC; iHost root no longer runs app build in Actions.

            Windows release. Install the setup exe or MSI.
            **Share server** and in-app updates work with this build.
          draft: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/msi/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
