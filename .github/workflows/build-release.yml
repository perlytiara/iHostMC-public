name: Build release

# Only one build per release: run on tag push (e.g. v0.5.4) or manual trigger. No branch push.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os == 'windows-latest' && 'Windows' || 'Linux' }}
    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-22.04
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Ensure env
        run: npm run ensure-env

      - name: Verify signing key (fail fast before long build)
        if: runner.os == 'Windows'
        run: |
          node -e "require('fs').writeFileSync('verify.bin','x')"
          npx tauri signer sign verify.bin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sync version and run tests
        run: npm run sync-version && npm run test:run

      - name: Build Tauri
        run: npm run build:public
        env:
          VITE_API_BASE_URL: https://api.ihost.one
          VITE_WEBSITE_URL: https://ihost.one
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate latest.json for updater
        if: runner.os == 'Windows'
        run: node scripts/gen-latest-json.cjs

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/msi/*.sig

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/*/*.tar.*
            src-tauri/target/release/bundle/*/*.sig

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: artifacts/linux
          merge-multiple: true

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: iHostMC ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          body: |
            ## iHostMC v${{ steps.version.outputs.version }}

            Minecraft server host — create, run, and back up servers. In-app updates enabled for Windows.

            ### Downloads (assets below)

            **Windows**
            - **Installer (recommended):** [iHostMC_${{ steps.version.outputs.version }}_x64-setup.exe](https://github.com/perlytiara/iHostMC/releases/download/v${{ steps.version.outputs.version }}/iHostMC_${{ steps.version.outputs.version }}_x64-setup.exe) — NSIS installer, in-app updater
            - **MSI:** `iHostMC_${{ steps.version.outputs.version }}_x64_en-US.msi` (in Assets below)

            **Linux**
            - `.deb`, `.rpm`, or tarball — see Assets below.

            ### Updating
            Open iHostMC → it will prompt when a new version is available, or download the latest installer from this release.
          draft: false
          files: |
            artifacts/windows/**
            artifacts/linux/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
