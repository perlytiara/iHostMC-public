name: Build release

# Only one build per release: run on tag push (e.g. v0.5.4) or manual trigger. No branch push.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Ensure env
        run: npm run ensure-env

      - name: Verify signing key (fail fast before long build)
        run: |
          node -e "require('fs').writeFileSync('verify.bin','x')"
          npx tauri signer sign verify.bin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sync version and run tests
        run: npm run sync-version && npm run test:run

      - name: Build Tauri (Windows)
        run: npm run build:public
        env:
          VITE_API_BASE_URL: https://api.ihost.one
          VITE_WEBSITE_URL: https://ihost.one
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate latest.json for updater
        run: node scripts/gen-latest-json.cjs

      - name: Create GitHub Release and upload Windows artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: iHostMC ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          body: |
            ## v0.5.5
            - **Update experience (Discord-style):** Single embedded update modal with progress bar. Download and install in-app—no separate installer exe or yes/no popups. Clear phases: Downloading (with %), Installing, Restarting. Modal can’t be closed during update.

            **Windows:** Install the setup exe or MSI.
            **Linux (Ubuntu):** Install the .deb or use the AppImage.
            **Share server** and in-app updates work with this build.
          draft: false
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json
            src-tauri/target/release/bundle/msi/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    needs: build-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Ensure env
        run: npm run ensure-env

      - name: Verify signing key (fail fast before long build)
        run: |
          node -e "require('fs').writeFileSync('verify.bin','x')"
          npx tauri signer sign verify.bin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sync version and run tests
        run: npm run sync-version && npm run test:run

      - name: Build Tauri (Linux)
        run: npm run build:public
        env:
          VITE_API_BASE_URL: https://api.ihost.one
          VITE_WEBSITE_URL: https://ihost.one
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate latest.json for updater (Linux)
        run: node scripts/gen-latest-json.cjs

      - name: Upload Linux artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.sig
            src-tauri/target/release/bundle/appimage/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
