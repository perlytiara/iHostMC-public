# iHostMC – ihost.one (main), mc.ihost.one (marketing/iHostMC), app.ihost.one (app/dashboard), api, play, cloud
# Copy to /etc/nginx/sites-available/ihost-one and enable.
# After adding DNS (see docs/DNS-IHOST-ONE.md), run:
#   sudo certbot certonly --nginx -d ihost.one -d www.ihost.one -d api.ihost.one -d play.ihost.one -d mc.ihost.one -d cloud.ihost.one -d app.ihost.one
# Then: sudo ln -sf /etc/nginx/sites-available/ihost-one /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS for all
server {
  listen 80;
  server_name ihost.one www.ihost.one api.ihost.one play.ihost.one mc.ihost.one cloud.ihost.one app.ihost.one;
  return 301 https://$host$request_uri;
}

# Main website – https://ihost.one (www → redirect)
server {
  listen 443 ssl;
  http2 on;
  server_name www.ihost.one;
  ssl_certificate     /etc/letsencrypt/live/ihost.one/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ihost.one/privkey.pem;
  return 301 https://ihost.one$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name ihost.one mc.ihost.one;

  ssl_certificate     /etc/letsencrypt/live/ihost.one/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ihost.one/privkey.pem;

  client_max_body_size 1024M;

  # Don't cache HTML so after deploy users get fresh chunk references (avoids ChunkLoadError).
  location / {
    proxy_pass http://127.0.0.1:3020;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass 1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Long cache for static assets (chunks, CSS, JS) – immutable hashes in filenames.
  # Pass $request_uri as-is so percent-encoded brackets (%5B%5D) reach Next.js; some stacks return 400 for literal [ ] in path.
  location /_next/static/ {
    proxy_pass http://127.0.0.1:3020$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}

# API – https://api.ihost.one (backup/sync uploads can be large – allow up to 1GB)
server {
  listen 443 ssl;
  http2 on;
  server_name api.ihost.one;

  ssl_certificate     /etc/letsencrypt/live/ihost.one/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ihost.one/privkey.pem;

  client_max_body_size 1024M;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  location / {
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Private GitHub deploy webhook (builder on 9090). Path must match GITHUB_WEBHOOK_PATH in deploy/.env.
  location ~ ^/_internal/ {
    proxy_pass http://127.0.0.1:9090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
  }

  location /api/stripe/webhook {
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Stripe-Signature $http_stripe_signature;
  }
}

# Relay port-api over HTTPS – https://play.ihost.one (frps on play.ihost.one:7000)
server {
  listen 443 ssl;
  http2 on;
  server_name play.ihost.one;

  ssl_certificate     /etc/letsencrypt/live/ihost.one/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ihost.one/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:8081;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

